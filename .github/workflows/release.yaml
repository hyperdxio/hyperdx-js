name: Release
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
  id-token: write
jobs:
  release:
    timeout-minutes: 10
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"
          registry-url: "https://registry.npmjs.org"
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Install dependencies
        run: yarn
      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: yarn run version
          publish: echo "skipping publish in changesets action"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish to npm with OIDC trusted publishing
        if: steps.changesets.outputs.hasChangesets != 'true'
        run: |
          # Remove the _authToken set by setup-node/changesets to let npm
          # handle OIDC trusted publishing natively (no auth token needed)
          if [ -n "$NPM_CONFIG_USERCONFIG" ] && [ -f "$NPM_CONFIG_USERCONFIG" ]; then
            sed -i '/_authToken/d' "$NPM_CONFIG_USERCONFIG"
          fi
          unset NODE_AUTH_TOKEN
          echo "=== npm config ==="
          npm config list
          echo ""
          yarn run release
        env:
          NPM_CONFIG_PROVENANCE: true
      - name: Publish snapshot to next tag
        if: steps.changesets.outputs.published != 'true' && steps.changesets.outputs.hasChangesets == 'true'
        run: |
          if [ -n "$NPM_CONFIG_USERCONFIG" ] && [ -f "$NPM_CONFIG_USERCONFIG" ]; then
            sed -i '/_authToken/d' "$NPM_CONFIG_USERCONFIG"
          fi
          unset NODE_AUTH_TOKEN
          yarn run release:next
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
