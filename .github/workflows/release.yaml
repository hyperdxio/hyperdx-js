name: Release
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
  id-token: write
jobs:
  release:
    timeout-minutes: 10
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "yarn"
          registry-url: "https://registry.npmjs.org"
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Install dependencies
        run: yarn
      - name: Debug npm auth setup
        run: |
          echo "=== npm version ==="
          npm --version
          echo ""
          echo "=== Node version ==="
          node --version
          echo ""
          echo "=== NPM Config ==="
          npm config list
          echo ""
          echo "=== .npmrc files ==="
          echo "NPM_CONFIG_USERCONFIG: $NPM_CONFIG_USERCONFIG"
          if [ -f "$NPM_CONFIG_USERCONFIG" ]; then
            echo "--- contents (redacted) ---"
            sed 's/_authToken=.*/_authToken=REDACTED/' "$NPM_CONFIG_USERCONFIG"
          fi
          if [ -f .npmrc ]; then
            echo "=== Repo root .npmrc ==="
            cat .npmrc
          fi
          echo ""
          echo "=== Check OIDC availability ==="
          if [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            echo "OIDC endpoint available: Yes"
          else
            echo "OIDC endpoint available: No"
          fi
      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: yarn run version
          publish: yarn run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
      - name: Publish snapshot to next tag
        if: steps.changesets.outputs.published != 'true' && steps.changesets.outputs.hasChangesets == 'true'
        run: yarn run release:next
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
